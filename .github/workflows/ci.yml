name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Versão do pnpm vem só do campo packageManager no package.json (sem input version aqui).
      - uses: pnpm/action-setup@v4
        with:
          cache: true
          cache_dependency_path: pnpm-lock.yaml
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: '0'
      - name: Lint, test, build (web)
        run: pnpm exec turbo run lint test build --filter=@portfolio/web

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: apps/api/go.sum
      - working-directory: apps/api
        run: go mod download
      - working-directory: apps/api
        run: go vet ./...
      - working-directory: apps/api
        run: go test ./... -count=1
      - working-directory: apps/api
        run: go build -trimpath -o /tmp/api ./cmd/api

  api-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: apps/api/go.sum
      - working-directory: apps/api
        run: go mod download
      - working-directory: apps/api
        run: go test -tags=integration ./... -count=1

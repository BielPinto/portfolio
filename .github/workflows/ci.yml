name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo run lint build --filter=@portfolio/web

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: apps/api/go.sum
      - working-directory: apps/api
        run: go mod download
      - working-directory: apps/api
        run: go vet ./...
      - working-directory: apps/api
        run: go test ./... -count=1
      - working-directory: apps/api
        run: go build -trimpath -o /tmp/api ./cmd/api

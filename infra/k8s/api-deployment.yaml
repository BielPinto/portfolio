apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-api
  namespace: portfolio
  labels:
    app.kubernetes.io/name: portfolio
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: portfolio
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portfolio
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          # Replace with your registry (e.g. ECR) after docker build.
          image: portfolio-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: portfolio-api-config
                  key: LOG_LEVEL
            - name: RATE_LIMIT
              valueFrom:
                configMapKeyRef:
                  name: portfolio-api-config
                  key: RATE_LIMIT
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: portfolio-api-config
                  key: CORS_ORIGINS
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: portfolio-api-secret
                  key: DATABASE_URL
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: portfolio-api-secret
                  key: ADMIN_API_KEY
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi

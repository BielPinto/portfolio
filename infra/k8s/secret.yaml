# Template: replace stringData values before apply, or create the secret out-of-band:
#   kubectl create secret generic portfolio-api-secret -n portfolio \
#     --from-literal=DATABASE_URL='postgres://...' \
#     --from-literal=ADMIN_API_KEY=''
#
# Do not commit real credentials. For production, prefer Sealed Secrets or External Secrets (e.g. AWS Secrets Manager).
apiVersion: v1
kind: Secret
metadata:
  name: portfolio-api-secret
  namespace: portfolio
  labels:
    app.kubernetes.io/name: portfolio
    app.kubernetes.io/component: api
type: Opaque
stringData:
  DATABASE_URL: "REPLACE_WITH_POSTGRES_URL"
  ADMIN_API_KEY: ""

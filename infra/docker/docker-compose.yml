services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: portifolio
      POSTGRES_PASSWORD: portifolio
      POSTGRES_DB: portifolio
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portifolio -d portifolio"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      LOG_LEVEL: info
      RATE_LIMIT: "100-M"
      DATABASE_URL: postgres://portifolio:portifolio@postgres:5432/portifolio?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  # Static SPA (nginx). Build context is the repo root — see apps/web/Dockerfile.
  # Override VITE_API_BASE_URL via infra/docker/.env or the shell when building.
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "4173:80"
    depends_on:
      - app

volumes:
  pgdata:

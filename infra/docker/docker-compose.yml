services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: portifolio
      POSTGRES_PASSWORD: portifolio
      POSTGRES_DB: portifolio
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portifolio -d portifolio"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      LOG_LEVEL: info
      RATE_LIMIT: "100-M"
      DATABASE_URL: postgres://portifolio:portifolio@postgres:5432/portifolio?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
